<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <section id="home-screen" class="screen active">
    <div class="hero">
      <h1>Welcome to Quiz App</h1>

      <div class="features">
        <article class="feature-card">
          <h3>Interactive</h3>
          <p>Engage with easy questions and answer templates.</p>
        </article>

        <article class="feature-card">
          <h3>Instant Feedback</h3>
          <p>Get immediate results after each quiz.</p>
        </article>

        <article class="feature-card">
          <h3>Responsive</h3>
          <p>Works on mobile, tablet and desktop.</p>
        </article>
      </div>

      <button onclick="showScreen('auth-screen')">Start</button>
    </div>
  </section>

  <!-- AUTH SCREEN -->
  <section id="auth-screen" class="screen">
    <div class="auth-card">
      <div class="auth-toggle">
        <button onclick="toggleAuth(true)">Login</button>
        <button onclick="toggleAuth(false)">Register</button>
      </div>

      <form id="auth-form">
        <input type="text" placeholder="Full name" id="name">
        <input type="email" placeholder="you@example.com" required>
        <input type="password" placeholder="Password" required>

        <button type="button" onclick="startQuiz()">Submit</button>
      </form>
    </div>
  </section>

  <!-- QUIZ SCREEN -->
  <section id="quiz-screen" class="screen">
    <div class="quiz-box">
      <h2 id="question">Question here</h2>
      <div id="answers"></div>
      <button onclick="nextQuestion()">Next</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
